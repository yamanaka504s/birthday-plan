<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>バースちゃん - 誕生日会計画書作成</title>
<style>
  :root {
    --primary: #e87461;
    --primary-light: #fdf0ee;
    --primary-dark: #c45847;
    --accent: #f5a623;
    --bg: #faf7f5;
    --card: #ffffff;
    --text: #333333;
    --text-light: #777777;
    --border: #e0d8d2;
    --success: #4caf50;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: var(--bg); color: var(--text); line-height: 1.7;
  }
  header {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; text-align: center; padding: 28px 16px 22px;
    position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,.15);
  }
  header h1 { font-size: 1.5rem; letter-spacing: .06em; }
  header p { font-size: .85rem; opacity: .85; margin-top: 4px; }
  .container { max-width: 820px; margin: 0 auto; padding: 24px 16px 80px; }
  .section {
    background: var(--card); border: 1px solid var(--border); border-radius: 14px;
    padding: 24px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,.04);
  }
  .section-title {
    font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-bottom: 18px;
    padding-bottom: 8px; border-bottom: 2px solid var(--primary-light);
    display: flex; align-items: center; gap: 8px;
  }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-grid .full { grid-column: 1 / -1; }
  .field label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 4px; color: #555; }
  .field input, .field textarea, .field select {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: .95rem; font-family: inherit; transition: border-color .2s;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(232,116,97,.15);
  }
  .field textarea { resize: vertical; min-height: 80px; }

  /* Setup */
  .setup-overlay {
    display: flex; position: fixed; inset: 0; background: rgba(0,0,0,.45);
    z-index: 500; justify-content: center; align-items: center; padding: 20px;
  }
  .setup-overlay.hidden { display: none; }
  .setup-box {
    background: #fff; border-radius: 16px; padding: 36px 32px; max-width: 420px;
    width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }
  .setup-box h2 { font-size: 1.2rem; color: var(--primary); margin-bottom: 20px; }
  .setup-box label { display: block; font-size: .9rem; font-weight: 600; color: #555; margin-bottom: 6px; text-align: left; }
  .setup-box input, .setup-box select {
    width: 100%; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px;
    font-size: 1rem; font-family: inherit; margin-bottom: 18px;
  }
  .setup-box input:focus, .setup-box select:focus {
    outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(232,116,97,.15);
  }
  .setup-box .btn-start {
    width: 100%; padding: 14px; background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer;
  }
  .setup-box .btn-start:hover { opacity: .88; }

  /* DateTime */
  .datetime-row { display: flex; gap: 10px; align-items: center; }
  .datetime-row input, .datetime-row select {
    padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: .95rem; font-family: inherit;
  }
  .datetime-row input:focus, .datetime-row select:focus {
    outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(232,116,97,.15);
  }
  .datetime-row input[type="date"] { flex: 1; }
  .datetime-row select { width: 80px; }
  .datetime-row span { font-weight: 600; color: #555; font-size: .9rem; }

  /* AI */
  .ai-field { margin-bottom: 24px; }
  .ai-field label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 4px; color: #555; }
  .ai-field textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px;
    font-size: .95rem; font-family: inherit; resize: vertical; min-height: 100px;
  }
  .ai-field textarea:focus {
    outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(232,116,97,.15);
  }
  .ai-result {
    margin-top: 8px; background: var(--primary-light); border: 1px solid #f0d6d1;
    border-radius: 8px; padding: 18px 16px 12px; font-size: .93rem; display: none; position: relative;
  }
  .ai-result .result-label {
    position: absolute; top: -10px; left: 12px; background: var(--primary); color: #fff;
    font-size: .7rem; padding: 1px 10px; border-radius: 10px; font-weight: 600;
  }
  .ai-result.show { display: block; }
  .ai-result .result-text {
    display: block; width: 100%; min-height: 40px; margin-bottom: 10px; padding: 8px 10px;
    border: 1px solid #e0d0cc; border-radius: 6px; font-size: .93rem; font-family: inherit;
    line-height: 1.7; resize: none; overflow: hidden; background: #fff;
  }
  .ai-result .result-text:focus {
    outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(232,116,97,.15);
  }
  .ai-btn-row { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
  .btn-ai {
    display: inline-flex; align-items: center; gap: 6px;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: #fff; border: none; padding: 8px 16px; border-radius: 8px;
    font-size: .82rem; font-weight: 600; cursor: pointer;
  }
  .btn-ai:hover { opacity: .88; }
  .btn-ai:disabled { opacity: .5; cursor: not-allowed; }
  .btn-ai .spinner {
    width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn-ai-sub {
    background: #fff; color: var(--primary); border: 1.5px solid var(--primary);
    padding: 7px 14px; border-radius: 8px; font-size: .8rem; font-weight: 600; cursor: pointer;
  }
  .btn-ai-sub:hover { background: var(--primary-light); }
  .btn-ai-sub:disabled { opacity: .5; cursor: not-allowed; }
  .btn-revert {
    background: #fff; color: #888; border: 1.5px solid #ccc;
    padding: 7px 14px; border-radius: 8px; font-size: .8rem; font-weight: 600; cursor: pointer;
  }
  .btn-revert:hover { background: #f5f5f5; }
  .btn-ai-all {
    width: 100%; padding: 14px; font-size: 1rem; border-radius: 10px; margin-top: 4px; justify-content: center;
  }

  /* Illustration */
  .illust-area {
    margin-top: 8px; text-align: center; display: none;
    background: var(--primary-light); border: 1px solid #f0d6d1; border-radius: 8px;
    padding: 18px 16px 12px; position: relative;
  }
  .illust-area.show { display: block; }
  .illust-area .result-label {
    position: absolute; top: -10px; left: 12px; background: var(--primary); color: #fff;
    font-size: .7rem; padding: 1px 10px; border-radius: 10px; font-weight: 600;
  }
  .illust-area svg, .illust-area img { max-width: 100%; width: 100%; height: auto; border-radius: 8px; }

  /* Action */
  .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 8px; }
  .btn {
    flex: 1; min-width: 160px; padding: 14px 20px; border: none; border-radius: 10px;
    font-size: 1rem; font-weight: 700; cursor: pointer; text-align: center;
  }
  .btn:active { transform: scale(.97); }
  .btn-preview { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: #fff; }
  .btn-clear { background: #eee; color: #555; flex: 0; min-width: 100px; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
    z-index: 200; justify-content: center; align-items: flex-start; padding: 10px; overflow-y: auto;
  }
  .modal-overlay.show { display: flex; }
  .modal { background: #fff; border-radius: 14px; max-width: 800px; width: 100%; margin: 10px auto; overflow: hidden; box-sizing: border-box; }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 16px; background: var(--primary); color: #fff;
  }
  .modal-header h2 { font-size: 1.1rem; }
  .modal-close { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; }
  .modal-body { padding: 12px 16px; overflow-x: hidden; word-break: break-word; }
  .modal-body * { max-width: 100%; box-sizing: border-box; }
  .modal-actions {
    padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end;
  }
  .modal-actions .btn { flex: 0; min-width: 140px; font-size: .9rem; padding: 10px 20px; }
  .btn-pdf-save { background: linear-gradient(135deg, #e87461, #c45847); color: #fff; flex: 1 !important; min-width: 200px !important; font-size: 1rem !important; padding: 14px 20px !important; }
  .btn-pdf-share { background: linear-gradient(135deg, #34b7f1, #0088cc); color: #fff; flex: 1 !important; min-width: 200px !important; font-size: 1rem !important; padding: 14px 20px !important; }
  .modal-actions { flex-wrap: wrap; }

  /* Print Doc */
  .print-doc { font-size: .85rem; }
  .print-doc h2 { text-align: center; font-size: 1.2rem; margin: 0 0 0px; padding: 0; color: var(--primary-dark); }
  .print-doc .event-subtitle { text-align: center; font-size: 1rem; color: var(--accent); font-weight: 700; margin: 2px 0 2px; }
  .print-doc .subtitle { text-align: center; font-size: .78rem; color: var(--text-light); margin: 0 0 8px; padding: 0; }
  .print-doc .illust-print { text-align: center; margin: 0 0 10px; }
  .print-doc .illust-print svg, .print-doc .illust-print img { max-width: 400px; width: 400px; height: auto; border-radius: 6px; }
  .print-doc { overflow-x: hidden; max-width: 100%; }
  .print-doc table { width: 100%; border-collapse: collapse; margin-bottom: 12px; table-layout: fixed; word-wrap: break-word; overflow-wrap: break-word; }
  .print-doc th, .print-doc td {
    border: 1px solid #ccc; padding: 5px 10px; text-align: left; vertical-align: top; font-size: .83rem;
  }
  .print-doc th { background: var(--primary-light); font-weight: 600; white-space: nowrap; }
  .print-doc .section-heading {
    font-size: .92rem; font-weight: 700; color: var(--primary);
    margin: 10px 0 4px; padding-bottom: 2px; border-bottom: 1.5px solid var(--primary-light);
  }
  .print-doc .text-block { padding: 4px 0 8px; white-space: pre-wrap; line-height: 1.6; font-size: .83rem; }

  @media print {
    @page { margin: 10mm 10mm; }
    body { background: #fff; font-size: 10pt; margin: 0; padding: 0; }
    header, .container > .section, .setup-overlay,
    .modal-header, .modal-actions, .no-print { display: none !important; }
    .modal-overlay { position: static; display: block !important; background: none; padding: 0; margin: 0; }
    .modal { border-radius: 0; box-shadow: none; margin: 0; padding: 0; max-width: 100%; overflow: visible; }
    .modal-body { padding: 0; margin: 0; }
    .print-doc { font-size: 10pt; margin: 0; padding: 0; max-width: 100%; overflow: visible; }
    .print-doc h2 { font-size: 14pt; margin: 0 0 0; padding: 0; }
    .print-doc .event-subtitle { font-size: 12pt; margin: 1px 0 1px; }
    .print-doc .subtitle { margin: 0 0 4px; padding: 0; }
    .print-doc .illust-print { margin: 0 0 6px; }
    .print-doc .illust-print svg, .print-doc .illust-print img { max-width: 360px; width: 360px; }
    .print-doc table { width: 100%; table-layout: fixed; word-wrap: break-word; overflow-wrap: break-word; }
    .print-doc th, .print-doc td { padding: 3px 6px; font-size: 9pt; word-wrap: break-word; overflow-wrap: break-word; }
    .print-doc th { background: #f5f5f5 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; white-space: nowrap; width: auto; }
    .print-doc .section-heading { font-size: 11pt; margin: 6px 0 2px; }
    .print-doc .text-block { font-size: 9.5pt; line-height: 1.5; padding: 2px 0 4px; }
  }

  /* SP mode */
  body.sp-mode .container { padding: 12px 8px 60px; }
  body.sp-mode .section { padding: 16px 12px; margin-bottom: 14px; }
  body.sp-mode .form-grid { grid-template-columns: 1fr; gap: 12px; }
  body.sp-mode .section-title { font-size: 1rem; }
  body.sp-mode header { padding: 18px 12px 14px; }
  body.sp-mode header h1 { font-size: 1.2rem; }
  body.sp-mode .ai-field textarea { min-height: 70px; font-size: .9rem; }
  body.sp-mode .ai-result .result-text { font-size: .88rem; }
  body.sp-mode .ai-btn-row { gap: 4px; }
  body.sp-mode .btn-ai-sub { padding: 6px 10px; font-size: .75rem; }
  body.sp-mode .btn-revert { padding: 6px 10px; font-size: .75rem; }
  body.sp-mode .btn-ai { padding: 7px 12px; font-size: .78rem; }
  body.sp-mode .btn { padding: 12px 14px; font-size: .9rem; min-width: 0; }
  body.sp-mode .datetime-row { flex-wrap: wrap; }
  /* SP: モーダル */
  body.sp-mode .modal-overlay { padding: 5px; }
  body.sp-mode .modal { margin: 5px auto; border-radius: 10px; }
  body.sp-mode .modal-body { padding: 10px 10px; }
  body.sp-mode .modal-header { padding: 10px 12px; }
  body.sp-mode .print-doc { font-size: .8rem; }
  body.sp-mode .print-doc h2 { font-size: 1rem; }
  body.sp-mode .print-doc .event-subtitle { font-size: .9rem; }
  body.sp-mode .print-doc .section-heading { font-size: .85rem; }
  body.sp-mode .print-doc .text-block { font-size: .8rem; }
  body.sp-mode .print-doc .illust-print img { max-width: 100%; width: 100%; }
  /* SP: 計画書テーブルを1列に */
  body.sp-mode .print-doc table { display: block; }
  body.sp-mode .print-doc tr { display: flex; flex-wrap: wrap; border-bottom: 1px solid #ccc; }
  body.sp-mode .print-doc th,
  body.sp-mode .print-doc td { display: block; border: none; border-bottom: none; }
  body.sp-mode .print-doc th { width: 100%; background: var(--primary-light); padding: 4px 10px; font-size: .82rem; }
  body.sp-mode .print-doc td { width: 100%; padding: 4px 10px 8px; font-size: .9rem; }
  /* SP: モーダルボタン横並び */
  body.sp-mode .modal-actions { flex-wrap: wrap; gap: 8px; padding: 12px 16px; }
  body.sp-mode .modal-actions .btn { flex: 1; min-width: 0; padding: 10px 8px; font-size: .82rem; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    header h1 { font-size: 1.2rem; }
    .section { padding: 18px 16px; }
    .datetime-row { flex-wrap: wrap; }
  }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: #333; color: #fff; padding: 12px 24px; border-radius: 10px;
    font-size: .9rem; z-index: 300; opacity: 0; transition: all .3s;
  }
  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- 初期設定 -->
<div class="setup-overlay" id="setupOverlay">
  <div class="setup-box">
    <h2>&#127874; バースちゃんへようこそ</h2>
    <label>担当者名（名字だけでもOK）</label>
    <input type="text" id="setupPlanner" placeholder="例：佐藤">
    <label>使用デバイス</label>
    <select id="setupDevice">
      <option value="pc">パソコン</option>
      <option value="sp">スマホ</option>
    </select>
    <button class="btn-start" onclick="completeSetup()">はじめる</button>
  </div>
</div>

<header>
  <h1>&#127874; バースちゃん</h1>
  <p>福祉施設 利用者さまの誕生日会を素敵に計画</p>
</header>

<div class="container">

  <!-- 基本情報 -->
  <div class="section">
    <div class="section-title">&#127874; 基本情報</div>
    <div class="form-grid">
      <div class="field">
        <label>計画担当者</label>
        <input type="text" id="planner" placeholder="例：佐藤">
      </div>
      <div class="field">
        <label>利用者名</label>
        <input type="text" id="userName" placeholder="例：山田 太郎 さん">
      </div>
      <div class="field full">
        <label>日時</label>
        <div class="datetime-row">
          <input type="date" id="eventDate">
          <select id="eventHour"></select>
          <span>:</span>
          <select id="eventMin"></select>
        </div>
      </div>
      <div class="field full"><label>場所</label><input type="text" id="venue" placeholder="例：施設内 多目的ホール"></div>
      <div class="field full"><label>参加家族</label><input type="text" id="family" placeholder="例：奥様（花子さん）、長男（一郎さん）"></div>
      <div class="field full"><label>参加スタッフ</label><input type="text" id="staff" placeholder="例：佐藤、鈴木、田中"></div>
      <div class="field"><label>費用</label><input type="text" id="cost" placeholder="例：5,000円（ケーキ代含む）"></div>
      <div class="field"><label>動画撮影者</label><input type="text" id="videographer" placeholder="例：鈴木"></div>
      <div class="field full"><label>準備物</label><textarea id="items" rows="2" placeholder="例：ケーキ、飾り付け、プレゼント、花束"></textarea></div>
      <div class="field full"><label>送迎車と運転手</label><input type="text" id="transport" placeholder="例：施設バス（運転手：高橋）"></div>
      <div class="field"><label>SNS公開</label>
        <select id="snsOk">
          <option value="OK">OK</option>
          <option value="NG">NG</option>
          <option value="要確認">要確認</option>
        </select>
      </div>
    </div>
  </div>

  <!-- AI支援セクション -->
  <div class="section">
    <div class="section-title">&#9998; AI文章作成セクション</div>
    <p style="font-size:.85rem;color:var(--text-light);margin-bottom:18px;">
      下書きを入力し「AIで洗練」ボタンを押すと、より丁寧で具体的な文章に仕上げます。<br>
      気に入るまで何度でもやり直せます。「元に戻す」で入力した下書きに戻れます。<br>
      AI作成後の文章は直接編集もできます。
    </p>

    <!-- 当日の流れ -->
    <div class="ai-field" id="field_schedule">
      <label>当日の流れ <span style="font-weight:400;font-size:.75rem;color:var(--text-light);">※時間の記入がない場合は、AIで洗練をすると適当に組みます</span></label>
      <textarea id="draft_schedule" placeholder="例：14時集合、飾り付け。15時にご家族到着。ケーキと歌でお祝い。写真撮影。16時お見送り。"></textarea>
      <div class="ai-btn-row">
        <button class="btn-ai" onclick="refineField('schedule')"><span class="spinner" id="spin_schedule"></span>AIで洗練</button>
      </div>
      <div class="ai-result" id="result_schedule">
        <span class="result-label">AI作成</span>
        <textarea class="result-text"></textarea>
        <div class="ai-btn-row">
          <button class="btn-ai-sub" onclick="retryField('schedule','shorter')">もっと短く</button>
          <button class="btn-ai-sub" onclick="retryField('schedule','different')">別の表現で</button>
          <button class="btn-ai-sub" onclick="retryField('schedule','detailed')">もう少し詳しく</button>
          <button class="btn-revert" onclick="revertField('schedule')">元に戻す</button>
        </div>
      </div>
    </div>

    <div class="ai-field" id="field_reason">
      <label>この企画にした理由</label>
      <textarea id="draft_reason" placeholder="例：太郎さんはカラオケが好き。家族と一緒に歌えるような誕生日会にしたい。"></textarea>
      <div class="ai-btn-row">
        <button class="btn-ai" onclick="refineField('reason')"><span class="spinner" id="spin_reason"></span>AIで洗練</button>
      </div>
      <div class="ai-result" id="result_reason">
        <span class="result-label">AI作成</span>
        <textarea class="result-text"></textarea>
        <div class="ai-btn-row">
          <button class="btn-ai-sub" onclick="retryField('reason','shorter')">もっと短く</button>
          <button class="btn-ai-sub" onclick="retryField('reason','different')">別の表現で</button>
          <button class="btn-ai-sub" onclick="retryField('reason','detailed')">もう少し詳しく</button>
          <button class="btn-revert" onclick="revertField('reason')">元に戻す</button>
        </div>
      </div>
    </div>

    <div class="ai-field" id="field_goal">
      <label>ゴールのイメージ <span style="font-weight:400;font-size:.75rem;color:var(--text-light);">※業務プログラミング作成時のものをコピペでもOK</span></label>
      <textarea id="draft_goal" placeholder="例：太郎さんが笑顔で過ごせること。家族との良い思い出作り。"></textarea>
      <div class="ai-btn-row">
        <button class="btn-ai" onclick="refineField('goal')"><span class="spinner" id="spin_goal"></span>AIで洗練</button>
      </div>
      <div class="ai-result" id="result_goal">
        <span class="result-label">AI作成</span>
        <textarea class="result-text"></textarea>
        <div class="ai-btn-row">
          <button class="btn-ai-sub" onclick="retryField('goal','shorter')">もっと短く</button>

async function callClaude(systemPrompt, messages, maxTokens) {
  const apiKey = localStorage.getItem('birthdayPlan_apiKey') || DEFAULT_API_KEY;
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: maxTokens || 1024,
      system: systemPrompt,
      messages: messages
    })
  });
  if (!res.ok) { console.error(await res.text()); toast('APIエラーが発生しました。'); throw new Error('API error'); }
  const data = await res.json();
  return data.content[0].text;
}

function setLoading(key, loading) {
  const spinner = document.getElementById('spin_' + key);

}

async function refineField(key) {
  const draft = document.getElementById('draft_' + key).value;
  if (!draft.trim()) { toast('下書きを入力してください'); return; }
  originalDrafts[key] = draft;
  localStorage.setItem('bd_orig_' + key, draft);

  const userName = document.getElementById('userName').value.trim();
  const context = userName ? `\n\n【利用者名】${userName}` : '';

  setLoading(key, true);
  try {
    const result = await callClaude(PROMPTS[key], [
      { role: 'user', content: `【下書き】\n${draft}${context}` }
    ]);
    aiResults[key] = result;
    localStorage.setItem('bd_ai_' + key, result);
    const box = document.getElementById('result_' + key);
    const ta = box.querySelector('.result-text');
    ta.value = cleanMarkdown(result);
    box.classList.add('show');
    setTimeout(() => autoResize(ta), 0);
    toast(`「${LABELS[key]}」を洗練しました`);
  } catch (e) {} finally { setLoading(key, false); }
}

async function retryField(key, mode) {
  const currentResult = aiResults[key];
  if (!currentResult) return;
  const draft = originalDrafts[key] || document.getElementById('draft_' + key).value;
  const userName = document.getElementById('userName').value.trim();
  const context = userName ? `\n\n【利用者名】${userName}` : '';

  setLoading(key, true);
  try {
    const result = await callClaude(PROMPTS[key], [
      { role: 'user', content: `【下書き】\n${draft}${context}` },
      { role: 'assistant', content: currentResult },
      { role: 'user', content: RETRY_INSTRUCTIONS[mode] }
    ]);
    aiResults[key] = result;
    localStorage.setItem('bd_ai_' + key, result);
    const box = document.getElementById('result_' + key);
    const ta = box.querySelector('.result-text');
    ta.value = cleanMarkdown(result);
    setTimeout(() => autoResize(ta), 0);
    toast(`「${LABELS[key]}」を再作成しました`);
  } catch (e) {} finally { setLoading(key, false); }
}

function revertField(key) {
  aiResults[key] = '';
  localStorage.removeItem('bd_ai_' + key);
  document.getElementById('result_' + key).classList.remove('show');
  if (originalDrafts[key]) {
    document.getElementById('draft_' + key).value = originalDrafts[key];

async function generateIllust() {
  if (illustCount >= ILLUST_MAX) {
    toast(`イラスト生成は${ILLUST_MAX}回までです（現在${illustCount}回使用済み）`);
    return;
  }

  const openaiKey = OPENAI_API_KEY;

  const spinner = document.getElementById('spin_illust');
  const btns = document.getElementById('field_illust').querySelectorAll('button');
  btns.forEach(b => b.disabled = true);

  const area = document.getElementById('illust_area');
  area.classList.add('show');
  preview.innerHTML = '<p style="color:var(--text-light);font-size:.9rem;padding:20px 0;">DALL-E 3でイラストを生成中...（30〜60秒ほどお待ちください）</p>';

  // Build prompt using Claude
  const context = gatherAllContext();
  const subtitle = cleanMarkdown(aiResults['subtitle']) || '';
  const detail = (document.getElementById('illust_detail') || {}).value || '';
  const dateStr = formatDate();

  let imagePrompt = '';
  try {
    const promptGen = `You are an expert at writing DALL-E image generation prompts.
Create a single English prompt for generating a beautiful anime-style illustration of this birthday party at a care facility.

Birthday party info:
${context}
Subtitle: ${subtitle}
Date: ${dateStr}
${detail ? 'Visual details (HIGHEST PRIORITY): ' + detail : ''}

Rules:
- Beautiful Japanese anime art style, warm and heartfelt
- Depict the actual party scene: the venue, decorations, cake, balloons, flowers
- Show the elderly birthday person in the center, surrounded by family and care staff
- Reflect the season from the date (cherry blossoms for spring, etc.)
- Include the party theme and activities mentioned
- Warm golden lighting, everyone smiling
- Output ONLY the prompt, under 300 words
- End with: no text, no words, no letters, no watermark`;

    imagePrompt = await callClaude(promptGen, [
      { role: 'user', content: 'Generate the DALL-E prompt.' }
    ], 500);
  } catch (e) {
    // Fallback prompt if Claude fails
    const venue = getVal('venue') || 'care facility room';
    imagePrompt = `Beautiful Japanese anime style illustration of a warm birthday celebration at a ${venue}. An elderly person sits in the center smiling, surrounded by family members and care staff. Birthday cake with candles on the table, colorful balloons, flower bouquet, gift boxes, happy birthday banner. Warm golden lighting, everyone smiling, heartwarming atmosphere. Studio Ghibli inspired, detailed background, soft cel shading. ${detail || ''}. no text, no words, no letters, no watermark`;
  }

  // Call DALL-E 3
  try {
    const res = await fetch('https://api.openai.com/v1/images/generations', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + openaiKey
      },
      body: JSON.stringify({
        model: 'dall-e-3',
        prompt: imagePrompt.trim().substring(0, 4000),
        n: 1,
        size: '1792x1024',
        quality: 'standard',
        response_format: 'b64_json'
      })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      const errMsg = errData.error?.message || res.status;
      throw new Error(errMsg);
    }

    const data = await res.json();
    const b64 = data.data[0].b64_json;
    const dataUrl = 'data:image/png;base64,' + b64;

    illustSvg = dataUrl;
    try { localStorage.setItem('bd_illust_svg', dataUrl); } catch(e) { /* too large for localStorage */ }
    preview.innerHTML = `<img src="${dataUrl}" alt="誕生日会イメージ">`;
    document.getElementById('btn_illust_retry').style.display = 'inline-flex';
    document.getElementById('btn_illust_clear').style.display = 'inline-flex';
    illustCount++;
    localStorage.setItem('bd_illust_count', String(illustCount));
    toast(`イラストを生成しました（残り${ILLUST_MAX - illustCount}回）`);

  } catch (e) {
    console.error('DALL-E error:', e);
    preview.innerHTML = `<p style="color:#e05040;font-size:.9rem;padding:10px 0;">エラー: ${e.message}</p>`;
    document.getElementById('btn_illust_retry').style.display = 'inline-flex';
    document.getElementById('btn_illust_clear').style.display = 'inline-flex';
  } finally {
    btns.forEach(b => b.disabled = false);
    spinner.style.display = 'none';
  }
}

以下の誕生日会計画の情報を読み、この企画の特徴が伝わるサブタイトルを1つだけ考えてください。
短く（15文字〜25文字程度）、自然で素朴な言葉遣いにしてください。
利用者さんの個性や企画内容が反映されたものにしてください。
タイトルのみを出力し、他の説明は不要です。`;

async function generateSubtitle() {
  const context = gatherAllContext();
  setLoading('subtitle', true);
  try {
    const result = await callClaude(SUBTITLE_SYSTEM, [
      { role: 'user', content: context }
    ], 200);
    aiResults['subtitle'] = result;
    localStorage.setItem('bd_ai_subtitle', result);
    const box = document.getElementById('result_subtitle');
    const ta = box.querySelector('.result-text');
    ta.value = cleanMarkdown(result).trim();
    box.classList.add('show');
    setTimeout(() => autoResize(ta), 0);
    toast('サブタイトルを提案しました');
  } catch (e) {} finally { setLoading('subtitle', false); }
}

async function retrySubtitle(mode) {
  const current = aiResults['subtitle'];
  if (!current) return;
  const context = gatherAllContext();
  setLoading('subtitle', true);
  try {
    const result = await callClaude(SUBTITLE_SYSTEM, [
      { role: 'user', content: context },
      { role: 'assistant', content: current },
      { role: 'user', content: RETRY_INSTRUCTIONS[mode] }
    ], 200);
    aiResults['subtitle'] = result;
    localStorage.setItem('bd_ai_subtitle', result);
    const box = document.getElementById('result_subtitle');
    const ta = box.querySelector('.result-text');
    ta.value = cleanMarkdown(result).trim();
    setTimeout(() => autoResize(ta), 0);
    toast('サブタイトルを再作成しました');
  } catch (e) {} finally { setLoading('subtitle', false); }
}

function clearSubtitle() {
  aiResults['subtitle'] = '';
  localStorage.removeItem('bd_ai_subtitle');
  document.getElementById('result_subtitle').classList.remove('show');
  toast('サブタイトルをクリアしました');
}

async function refineAll() {
  const btn = document.querySelector('#spin_all').parentElement;
  const spinner = document.getElementById('spin_all');
  btn.disabled = true; spinner.style.display = 'inline-block';
  // subtitle以外を先に洗練
  for (const key of ['schedule','reason','goal','caution']) {
    const draft = document.getElementById('draft_' + key).value.trim();
    if (draft) { try { await refineField(key); } catch(e) {} }
  }
  // 最後にサブタイトルとイラストを全文脈から生成
  try { await generateSubtitle(); } catch(e) {}
  try { await generateIllust(); } catch(e) {}
  btn.disabled = false; spinner.style.display = 'none';
  toast('すべての項目を洗練しました');
}

// ── Preview / Print ──
function getVal(id) { return document.getElementById(id).value.trim(); }
function formatDate() {
  const d = getVal('eventDate'), h = getVal('eventHour'), m = getVal('eventMin');
  if (!d) return '';
  const date = new Date(d + 'T' + h + ':' + m);
  const weekDays = ['日','月','火','水','木','金','土'];
  return `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日(${weekDays[date.getDay()]}) ${h}:${m}`;
}
function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
function cleanMarkdown(text) {
  if (!text) return text;
  return text
    .replace(/^#{1,6}\s+/gm, '').replace(/\*\*\*(.+?)\*\*\*/g, '$1')
    .replace(/\*\*(.+?)\*\*/g, '$1').replace(/\*(.+?)\*/g, '$1')
    .replace(/__(.+?)__/g, '$1').replace(/_(.+?)_/g, '$1')
    .replace(/~~(.+?)~~/g, '$1').replace(/`(.+?)`/g, '$1')
    .replace(/^>\s?/gm, '').replace(/^[\-\*]\s+/gm, '・')
    .replace(/^\d+\.\s+/gm, m => m.replace(/\./, '.'))
    .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1').replace(/---+/g, '').replace(/\n{3,}/g, '\n\n');
}

function buildDoc() {
  const name = getVal('userName') || '___';
  const plannerName = getVal('planner') || '___';
  const snsLabel = document.getElementById('snsOk').value;
  const aiText = (key) => {
    let t = cleanMarkdown(aiResults[key] || getVal('draft_' + key)) || '（未記入）';
    // Remove heading lines that duplicate section titles
    const headingLabels = ['当日の流れ','この企画にした理由','ゴールのイメージ','注意すべき点','対処方法','注意事項','利用者名'];
    t = t.replace(/^.*$/gm, function(line) {
      const trimmed = line.replace(/[\s【】■▼▶●☆★〇◆◇「」：:]/g, '');
      for (const l of headingLabels) {
        if (trimmed === l || trimmed === l.replace(/\s/g,'')) return '';
      }
      return line;
    });
    // Remove "利用者名：○○" lines
    t = t.replace(/^[\s]*利用者名[\s]*[:：].*$/gm, '');
    t = t.replace(/^\n+/, '').replace(/\n{3,}/g, '\n\n');
    return t.trim();
  };
  const sub = cleanMarkdown(aiResults['subtitle'] || getVal('draft_subtitle')) || '';
  const subHtml = sub ? `<div class="event-subtitle">${escapeHtml(sub)}</div>` : '';
  const illustHtml = illustSvg ? `<div class="illust-print"><img src="${illustSvg}" alt="誕生日会イメージ"></div>` : '';

  return `
<div class="print-doc">
  <h2>${escapeHtml(name)} さん 誕生日会 計画書</h2>
  ${subHtml}
  <p class="subtitle">作成日：${new Date().toLocaleDateString('ja-JP')}　／　計画担当者：${escapeHtml(plannerName)}</p>
  ${illustHtml}
  <table>
    <tr><th>利用者名</th><td>${escapeHtml(name)}</td><th>参加家族</th><td>${escapeHtml(getVal('family')||'（未記入）')}</td></tr>
    <tr><th>日時</th><td>${formatDate()}</td><th>場所</th><td>${escapeHtml(getVal('venue')||'（未記入）')}</td></tr>
    <tr><th>参加スタッフ</th><td>${escapeHtml(getVal('staff')||'（未記入）')}</td><th>送迎車・運転手</th><td>${escapeHtml(getVal('transport')||'（未記入）')}</td></tr>
    <tr><th>動画撮影者</th><td>${escapeHtml(getVal('videographer')||'（未記入）')}</td><th>SNS公開</th><td>${snsLabel}</td></tr>
    <tr><th>準備物</th><td>${escapeHtml(getVal('items')||'（未記入）')}</td><th>費用</th><td>${escapeHtml(getVal('cost')||'（未記入）')}</td></tr>
  </table>
  <div class="section-heading">当日の流れ</div>
  <div class="text-block">${escapeHtml(aiText('schedule'))}</div>
  <div class="section-heading">この企画にした理由</div>
  <div class="text-block">${escapeHtml(aiText('reason'))}</div>
  <div class="section-heading">ゴールのイメージ</div>
  <div class="text-block">${escapeHtml(aiText('goal'))}</div>
  <div class="section-heading">注意すべき点とその対処方法</div>
  <div class="text-block">${escapeHtml(aiText('caution'))}</div>
</div>`;
}

let lastPdfBlob = null;
let lastPdfFileName = '';

function showPreview() {
  document.getElementById('previewBody').innerHTML = buildDoc();
  document.getElementById('modalOverlay').classList.add('show');
  // Reset PDF state
  document.getElementById('btnPdfSave').style.display = '';
  document.getElementById('btnPdfShare').style.display = 'none';
  lastPdfBlob = null;
}
function closeModal(e) { if (e.target === e.currentTarget) closeAndResetPdf(); }
function closeAndResetPdf() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('btnPdfSave').style.display = '';
  document.getElementById('btnPdfShare').style.display = 'none';
  lastPdfBlob = null;
}

async function savePdf() {
  const el = document.getElementById('previewBody');
  const btn = document.getElementById('btnPdfSave');
  btn.textContent = 'PDF作成中...';
  btn.disabled = true;

  const modal = document.querySelector('.modal');
  const origMaxW = modal.style.maxWidth;
  const origW = modal.style.width;
  modal.style.maxWidth = '800px';
  modal.style.width = '800px';

  try {
    const canvas = await html2canvas(el, {
      scale: 2, useCORS: true, allowTaint: true,
      backgroundColor: '#ffffff', width: el.scrollWidth, windowWidth: 800
    });

    modal.style.maxWidth = origMaxW;
    modal.style.width = origW;

    const { jsPDF } = window.jspdf;
    const pdfWidth = 210, pdfHeight = 297;
    const imgWidth = pdfWidth - 20;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pageContentHeight = pdfHeight - 20;

    if (imgHeight <= pageContentHeight) {
      pdf.addImage(canvas.toDataURL('image/jpeg', 0.92), 'JPEG', 10, 10, imgWidth, imgHeight);
    } else {
      let srcY = 0, remainingHeight = imgHeight, page = 0;
      while (remainingHeight > 0) {
        if (page > 0) pdf.addPage();
        const sliceHeight = Math.min(pageContentHeight, remainingHeight);
        const sliceCanvasHeight = (sliceHeight / imgHeight) * canvas.height;
        const sc = document.createElement('canvas');
        sc.width = canvas.width; sc.height = sliceCanvasHeight;
        const ctx = sc.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, sc.width, sc.height);
        ctx.drawImage(canvas, 0, srcY, canvas.width, sliceCanvasHeight, 0, 0, canvas.width, sliceCanvasHeight);
        pdf.addImage(sc.toDataURL('image/jpeg', 0.92), 'JPEG', 10, 10, imgWidth, sliceHeight);
        srcY += sliceCanvasHeight;
        remainingHeight -= sliceHeight;
        page++;
      }
    }

    const name = getVal('userName') || '計画書';
    lastPdfFileName = `${name}さん誕生日会計画書.pdf`;
    lastPdfBlob = pdf.output('blob');

    // Download
    const url = URL.createObjectURL(lastPdfBlob);
    const a = document.createElement('a');
    a.href = url; a.download = lastPdfFileName; a.click();
    URL.revokeObjectURL(url);

    toast('PDFを保存しました');

    // Show share button, hide save button
    btn.style.display = 'none';
    const shareBtn = document.getElementById('btnPdfShare');
    shareBtn.style.display = '';

  } catch (e) {
    modal.style.maxWidth = origMaxW;
    modal.style.width = origW;
    console.error(e);
    toast('PDF作成に失敗しました');
  } finally {
    btn.textContent = 'PDFファイルで保存';
    btn.disabled = false;
  }
}

async function sharePdf() {
  if (!lastPdfBlob) { toast('先にPDFを保存してください'); return; }
  const file = new File([lastPdfBlob], lastPdfFileName, { type: 'application/pdf' });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: lastPdfFileName });
      toast('共有しました');
    } catch (e) {
      if (e.name !== 'AbortError') toast('共有がキャンセルされました');
    }
  } else {
    // Fallback: re-download
    const url = URL.createObjectURL(lastPdfBlob);
    const a = document.createElement('a');
    a.href = url; a.download = lastPdfFileName; a.click();
    URL.revokeObjectURL(url);
    toast('共有非対応のため再ダウンロードしました');
  }
}
function clearAll() {
  if (!confirm('すべての入力をリセットしますか？')) return;
  FIELDS.forEach(id => {
    const el = document.getElementById(id);
    if (el.tagName === 'SELECT') el.selectedIndex = 0; else el.value = '';
    localStorage.removeItem('bd_' + id);
  });
  AI_KEYS.forEach(key => {
    aiResults[key] = ''; originalDrafts[key] = '';
    localStorage.removeItem('bd_ai_' + key); localStorage.removeItem('bd_orig_' + key);
    const box = document.getElementById('result_' + key);
    box.classList.remove('show'); box.querySelector('.result-text').value = '';
  });
  // Clear subtitle
  aiResults['subtitle'] = ''; localStorage.removeItem('bd_ai_subtitle');
  const subBox = document.getElementById('result_subtitle');
  subBox.classList.remove('show'); subBox.querySelector('.result-text').value = '';
  // Clear illust
  illustSvg = ''; illustCount = 0;
  localStorage.removeItem('bd_illust_svg'); localStorage.removeItem('bd_illust_detail'); localStorage.removeItem('bd_illust_count');
  if (document.getElementById('illust_detail')) document.getElementById('illust_detail').value = '';
  document.getElementById('illust_preview').innerHTML = '';
  document.getElementById('illust_area').classList.remove('show');
  document.getElementById('btn_illust_retry').style.display = 'none';
  document.getElementById('btn_illust_clear').style.display = 'none';
  document.getElementById('eventHour').value = '14';
  document.getElementById('eventMin').value = '00';
  const p = localStorage.getItem('bd_planner');
  if (p) document.getElementById('planner').value = p;
  toast('リセットしました');
}
